<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CarePlus</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i> CarePlus
            </a>
            <div class="nav-links" style="gap: 1.5rem;">
                <div class="hidden-mobile" style="display: flex; gap: 1rem; align-items: center;">
                    <a href="login.html" style="font-weight: 600; color: var(--dark); text-decoration: none;">Login</a>
                    <a href="register.html" class="btn btn-signup btn-sm" style="padding: 0.5rem 1.25rem;">Sign Up</a>
                </div>
                <div class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-equals"></i>
                </div>
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <div style="padding: 1.5rem; display: flex; justify-content: flex-end; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 1rem;">
            <button onclick="toggleSidebar()" style="background: var(--bg-color); border: 1px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 10px; font-size: 1.25rem; color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Explore Doctors</a></li>
            <li><a href="login.html" class="active"><i class="fa-solid fa-right-from-bracket"></i> Login</a></li>
            <li><a href="register.html"><i class="fa-solid fa-user-plus"></i> Create Account</a></li>
        </ul>
    </aside>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your CarePlus portal</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginRole">Profile Type</label>
                    <select id="loginRole" required>
                        <option value="patient">Patient Account</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="e.g. name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Secure Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="margin-top: 1rem;">Sign In <i
                        class="fa-solid fa-arrow-right-to-bracket"></i></button>
            </form>

            <div class="auth-footer">
                <p>New to CarePlus? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const role = document.getElementById('loginRole').value;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (role === 'admin' && email === 'admin@careplus.com' && password === 'admin') {
                const adminUser = {
                    id: 'admin-001',
                    name: 'System Admin',
                    role: 'admin'
                };
                localStorage.setItem('careplus_currentUser', JSON.stringify(adminUser));
                window.location.href = 'admin.html';
                return;
            }

            try {
                const user = await apiCall('/users/login', 'POST', { email, password });

                if (user.role !== role) {
                    alert('Invalid Role for this account.');
                    return;
                }

                localStorage.setItem('careplus_currentUser', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    role: user.role
                }));

                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alert('Login Failed: ' + error.message);
            }
        });
    </script>
</body>

</html>
