<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CarePlus</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i>
                <span>CarePlus</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-signup btn-sm">Sign Up</a>
            </div>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your CarePlus portal</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginRole">Profile Type</label>
                    <select id="loginRole" required>
                        <option value="patient">Patient Account</option>
                        <option value="admin">System Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="e.g. name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Secure Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="margin-top: 1rem;">Sign In <i
                        class="fa-solid fa-arrow-right-to-bracket"></i></button>
            </form>

            <div class="auth-footer">
                <p>New to CarePlus? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const role = document.getElementById('loginRole').value;
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (role === 'admin' && email === 'admin@careplus.com' && password === 'admin') {
                const adminUser = {
                    id: 'admin-001',
                    name: 'System Admin',
                    role: 'admin'
                };
                localStorage.setItem('careplus_currentUser', JSON.stringify(adminUser));
                window.location.href = 'admin.html';
                return;
            }

            try {
                const user = await apiCall('/users/login', 'POST', { email, password });

                if (user.role !== role) {
                    alert('Invalid Role for this account.');
                    return;
                }

                localStorage.setItem('careplus_currentUser', JSON.stringify({
                    id: user.id,
                    name: user.name,
                    role: user.role
                }));

                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alert('Login Failed: ' + error.message);
            }
        });
    </script>
</body>

</html>
