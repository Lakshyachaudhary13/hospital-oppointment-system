<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CarePlus</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i> CarePlus
            </a>
            <div class="nav-links" style="gap: 1.5rem;">
                <div class="hidden-mobile" style="display: flex; gap: 1rem; align-items: center;">
                    <a href="login.html" style="font-weight: 600; color: var(--dark); text-decoration: none;">Login</a>
                    <a href="register.html" class="btn btn-signup btn-sm" style="padding: 0.5rem 1.25rem;">Sign Up</a>
                </div>
                <div class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-equals"></i>
                </div>
            </div>
        </nav>
    </header>

    <aside class="sidebar">
        <div style="padding: 1.5rem; display: flex; justify-content: flex-end; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 1rem;">
            <button onclick="toggleSidebar()" style="background: var(--bg-color); border: 1px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 10px; font-size: 1.25rem; color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="doctors.html"><i class="fa-solid fa-user-doctor"></i> Explore Doctors</a></li>
            <li><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i> Login</a></li>
            <li><a href="register.html" class="active"><i class="fa-solid fa-user-plus"></i> Create Account</a></li>
        </ul>
    </aside>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join CarePlus to manage your health appointments easily.</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="e.g. John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="e.g. john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="regPhone">Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="e.g. 1234567890" required>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Enter a secure password" required>
                </div>

                
                <input type="hidden" id="regRole" value="patient">
                
                <button type="submit" class="btn btn-primary w-full">Register Account</button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>
        
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            
            try {
                await apiCall('/users/register', 'POST', { name, email, phone, password, role });
                alert('Registration Successful! Please login to continue.');
                window.location.href = 'login.html';
            } catch (error) {
                alert('Registration Failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
