<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | CarePlus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i> CarePlus
            </a>
            <div class="nav-links">
                
            </div>
        </nav>
    </header>

    <main>
        <div class="dashboard-grid">
            <aside class="sidebar">
                <h3 id="welcomeName">Welcome, Patient</h3>
                <ul class="sidebar-menu">
                    <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                    <li><a href="appointment.html" class="active"><i class="fa-solid fa-calendar-plus"></i> Book Appointment</a></li>
                    <li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
                </ul>
            </aside>

            <div class="dashboard-content">
                <h2>Book highly rated doctors</h2>
                
               
                <div class="content-card mt-4" id="step1">
                    <div class="card-header">
                        <h3>1. Select a Doctor</h3>
                    </div>
                    <div class="doctor-grid" id="doctorGrid">
                        
                    </div>
                </div>

                <!-- Doctor Profile Modal -->
                <div id="doctorProfileModal" class="modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <span class="close" onclick="closeProfileModal()">&times;</span>
                            <div id="modalDoctorAvatar" class="doctor-avatar" style="width: 120px; height: 120px; margin: 0 auto 1rem; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); font-size: 2rem;"></div>
                            <h2 id="modalDoctorName" style="margin-bottom: 0.5rem;"></h2>
                            <p id="modalDoctorSpec" style="font-weight: 600; font-size: 1.1rem; opacity: 0.9;"></p>
                        </div>
                        <div class="modal-body">
                            <div class="profile-section">
                                <h4><i class="fa-solid fa-user-doctor"></i> About Doctor</h4>
                                <p id="modalDoctorBio"></p>
                            </div>
                            <div class="profile-section">
                                <h4><i class="fa-solid fa-graduation-cap"></i> Education</h4>
                                <p id="modalDoctorEdu"></p>
                            </div>
                            <div class="profile-section">
                                <h4><i class="fa-solid fa-award"></i> Key Achievements</h4>
                                <ul class="achievement-list" id="modalDoctorAchievements"></ul>
                            </div>
                            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                                <button class="btn btn-outline w-full" onclick="closeProfileModal()">Close</button>
                                <button id="modalBookBtn" class="btn btn-primary w-full">Proceed to Booking</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="content-card mt-4 hidden" id="step2">
                    <div class="card-header">
                        <h3>2. Choose Date & Time</h3>
                        <button class="btn btn-outline btn-sm" onclick="goBackToStep1()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                    </div>
                    <div style="padding: 1.5rem;">
                        <div id="selectedDoctorInfo" style="margin-bottom: 1.5rem; padding: 1rem; background: #F9FAFB; border-radius: 8px; border-left: 4px solid var(--primary);">
                            
                        </div>

                        <form id="bookingForm">
                            <input type="hidden" id="doctorId">
                            <input type="hidden" id="doctorName">
                            <input type="hidden" id="doctorSpec">

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label for="bookDate">Preferred Date</label>
                                    <input type="date" id="bookDate" required>
                                </div>
                                <div class="form-group">
                                    <label for="bookTime">Preferred Time</label>
                                    
                                    <select id="bookTime" required>
                                        <option value="" disabled selected>Select a time slot</option>
                                        <option value="09:00 AM">09:00 AM</option>
                                        <option value="10:00 AM">10:00 AM</option>
                                        <option value="11:30 AM">11:30 AM</option>
                                        <option value="02:00 PM">02:00 PM</option>
                                        <option value="03:30 PM">03:30 PM</option>
                                        <option value="05:00 PM">05:00 PM</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="bookReason">Reason for visit</label>
                                <textarea id="bookReason" rows="3" placeholder="Briefly describe your symptoms or reason for visit" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-full">Confirm Booking Request</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
    <script>
       
        checkAuth('patient');

        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            document.getElementById('welcomeName').textContent = `Welcome, ${currentUser.name.split(' ')[0]}`;

            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookDate').setAttribute('min', today);

            loadDoctors();
        });

        async function loadDoctors() {
            try {
                const doctors = await apiCall('/doctors');
                const grid = document.getElementById('doctorGrid');
                grid.innerHTML = '';

                doctors.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = 'doctor-card';
                    div.onclick = () => openProfileModal(doc);
                    
                    const initials = doc.name.replace('Dr. ', '').substring(0,2).toUpperCase();
                    const avatarContent = doc.image 
                        ? `<img src="${doc.image}" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #eef2ff;">`
                        : initials;
                    
                    div.innerHTML = `
                        <div class="doctor-avatar">${avatarContent}</div>
                        <div class="doctor-name">${doc.name}</div>
                        <div class="doctor-spec">${doc.specialty}</div>
                        <div style="margin-bottom: 1.5rem; color: var(--light-text); font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span><i class="fa-solid fa-briefcase-medical"></i> ${doc.experience}</span>
                            <span>•</span>
                            <span style="color: #f59e0b;"><i class="fa-solid fa-star"></i> ${doc.rating || '5.0'}</span>
                        </div>
                        <button class="btn btn-outline btn-sm w-full">
                            View Profile
                        </button>
                    `;
                    grid.appendChild(div);
                });
            } catch (error) {
                console.error('Failed to load doctors:', error);
            }
        }

        function openProfileModal(doc) {
            const modal = document.getElementById('doctorProfileModal');
            const initials = doc.name.replace('Dr. ', '').substring(0,2).toUpperCase();
            
            document.getElementById('modalDoctorAvatar').innerHTML = doc.image 
                ? `<img src="${doc.image}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">`
                : initials;
            
            document.getElementById('modalDoctorName').textContent = doc.name;
            document.getElementById('modalDoctorSpec').textContent = `${doc.specialty} • ${doc.experience}`;
            document.getElementById('modalDoctorBio').textContent = doc.bio || `${doc.name} is a highy experienced ${doc.specialty} with ${doc.experience} of medical expertise.`;
            document.getElementById('modalDoctorEdu').textContent = doc.education || 'Medical Degree from Accredited University';
            
            const achieveList = document.getElementById('modalDoctorAchievements');
            achieveList.innerHTML = '';
            (doc.achievements || ['Board Certified Specialist', 'Top Rated Healthcare Provider']).forEach(ach => {
                const li = document.createElement('li');
                li.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${ach}`;
                achieveList.appendChild(li);
            });

            document.getElementById('modalBookBtn').onclick = () => {
                closeProfileModal();
                selectDoctor(doc.id, doc.name, doc.specialty);
            };

            modal.style.display = 'flex';
        }

        function closeProfileModal() {
            document.getElementById('doctorProfileModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('doctorProfileModal');
            if (event.target == modal) {
                closeProfileModal();
            }
        }

        function selectDoctor(id, name, specialty) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            document.getElementById('doctorId').value = id;
            document.getElementById('doctorName').value = name;
            document.getElementById('doctorSpec').value = specialty;

            document.getElementById('selectedDoctorInfo').innerHTML = `
                <strong>Booking appointment with:</strong><br>
                ${name} - <em>${specialty}</em>
            `;
        }

        function goBackToStep1() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('bookingForm').reset();
        }

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const currentUser = JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            const doctorId = document.getElementById('doctorId').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            
            // Format: YYYY-MM-DDTHH:mm:SS
            // Simple mapping for demo: 09:00 AM -> 09:00:00
            let time24 = time.includes('PM') && !time.startsWith('12') ? 
                         (parseInt(time) + 12) : 
                         (time.startsWith('12') && time.includes('AM') ? '00' : time.split(':')[0].padStart(2, '0'));
            
            const isoTime = `${date}T${time24}:${time.split(':')[1].substring(0,2)}:00`;

            try {
                await apiCall(`/appointments/book?patientId=${currentUser.id}&doctorId=${doctorId}&time=${isoTime}`, 'POST');
                alert('Appointment booked successfully!');
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Booking Failed: ' + error.message);
            }
        });

    </script>
</body>
</html>
